<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GBA Loader</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    #menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    #game {
      width: 100vw;
      height: 100vh;
      display: none;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
    }
  </style>
</head>
<body>
  <div id="menu">
    <input type="file" id="romFile" accept=".gba" />
    <button id="startButton">PLAY</button>
  </div>

  <div id="game"></div>

  <script>
    document.getElementById("startButton").addEventListener("click", () => {
      const file = document.getElementById("romFile").files[0];

      if (!file) {
        alert("Choose a .gba file first.");
        return;
      }

      document.getElementById("menu").style.display = "none";
      document.getElementById("game").style.display = "block";

      window.EJS_player = "#game";
      window.EJS_core = "gba";
      window.EJS_color = "#000000";
      window.EJS_startOnLoaded = true;
      window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
      window.EJS_gameUrl = URL.createObjectURL(file);

      const script = document.createElement("script");
      script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
      document.body.appendChild(script);
    });
  </script>
</body>
</html>
