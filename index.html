<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GBA Loader</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #menu {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: black;
      z-index: 10;
    }

    #game {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: none;
      background: black;
    }

    #game canvas,
    #game video {
      width: 100% !important;
      height: 100% !important;
      display: block !important;
    }

    button,
    input[type="file"] {
      font-size: 16px;
      padding: 12px 18px;
      border-radius: 10px;
      border: none;
    }
  </style>
</head>
<body>
  <div id="menu">
    <input type="file" id="romFile" accept=".gba" />
    <button id="startButton">PLAY</button>
  </div>

  <div id="game"></div>

  <script>
    document.getElementById("startButton").addEventListener("click", () => {
      const file = document.getElementById("romFile").files[0];

      if (!file) {
        alert("Choose a .gba file first.");
        return;
      }

      document.getElementById("menu").style.display = "none";
      document.getElementById("game").style.display = "block";

      window.EJS_player = "#game";
      window.EJS_core = "gba";
      window.EJS_color = "#000000";
      window.EJS_startOnLoaded = true;
      window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
      window.EJS_gameUrl = URL.createObjectURL(file);
      window.EJS_controlScheme = "default";

      const script = document.createElement("script");
      script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
      document.body.appendChild(script);
    });
  </script>
</body>
</html>
